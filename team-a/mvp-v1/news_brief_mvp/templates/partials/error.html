<div class="card error-card">
  <div class="card-header">
    <div>
      <h2>Live Coverage Unavailable</h2>
      <p class="section-copy">
        This request could not be completed with live-only retrieval in this run.
      </p>
    </div>
    <span class="chip warning">Try Again</span>
  </div>
  <div class="section-panel">
    <p>{{ error_message }}</p>
    <div class="divider"></div>
    <p class="helper">
      For a steadier experience, try <strong>Auto live-or-fallback</strong> or
      <strong>Fallback dataset only</strong> instead of <strong>Live only</strong>.
    </p>
  </div>
</div>

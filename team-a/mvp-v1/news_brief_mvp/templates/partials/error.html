<article class="report-card error-card">
  <header class="report-head">
    <div>
      <div class="report-kicker">
        <span class="badge warning"><i data-lucide="triangle-alert" aria-hidden="true"></i>Needs attention</span>
      </div>
      <h2 class="report-topic">Live coverage unavailable</h2>
      <p class="section-copy">This request could not be completed with live source retrieval.</p>
    </div>
  </header>

  <section class="summary-block">
    <h3 class="section-title"><i data-lucide="info" aria-hidden="true"></i>What happened</h3>
    <p>{{ error_message }}</p>
    <p class="section-copy">Switch Coverage to <strong>Balanced coverage</strong> or <strong>Saved source set</strong> for a reliable local report.</p>
  </section>
</article>

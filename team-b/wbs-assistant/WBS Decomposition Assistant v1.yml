        desc: Generates WBS breakdown and sprint plan based on user stories
        model:
          completion_params:
            temperature: 0.7
          mode: chat
          name: claude-sonnet-4-20250514
          provider: langgenius/anthropic/anthropic
        prompt_template:
        - id: 8a887590-35ad-48a2-af39-451fe7777f0a
          role: system
          text: "You are a Scheduling Agent for a project management system. Your\
            \ job is to take a list of user stories and generate a Work Breakdown\
            \ Structure (WBS) and sprint plan.\n\nGiven the user stories, produce\
            \ the following:\n\n1. WBS - Break each user story into 3-5 concrete development\
            \ tasks\n2. Sprint Plan - Assign tasks across sprints assuming:\n   -\
            \ 4 team members\n   - 10 hours per person per week (40 person-hours/week)\n\
            \   - 5 weeks available (Weeks 6-10)\n   - High priority items go in earlier\
            \ sprints\n3. Effort Estimate - Estimate hours per task\n4. Sprint Summary\
            \ Table - Show which tasks land in which sprint with total hours per sprint\n\
            \nKeep the plan realistic. Flag if any sprint is over capacity."
        - id: c7e0c0b6-433d-4b95-b456-5be98e7e1673
          role: user
          text: 'Please generate a WBS and sprint plan based on the following user
            stories: {{#1776398370545.text#}}'
        selected: false
